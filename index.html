    />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), geolocation=(), microphone=*" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Schoolars Hub — Quality Tuition Coaching in Goa | Classes 1–12</title>
    <meta
      name="description"
      content="Schoolars Hub offers quality tuition coaching in Goa for Classes 1–12. Expert teachers in Science, Maths, English, Hindi, Konkani, Geography &amp; History. Two campuses — Thivim &amp; Corlim. 5.0★ Google rating."

      name="keywords"
      content="tuition classes in Goa, coaching centre Goa, Schoolars Hub, Science tuition Goa, Maths tuition Goa, English classes Goa, Hindi tuition, Konkani classes, tuition near me Goa, best coaching Thivim, coaching Corlim, Classes 1 to 12 tuition"
    />
    <meta name="author" content="Schoolars Hub" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f4ece1" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region" content="IN-GA" />
    <meta name="geo.placename" content="Goa, India" />
    <meta name="geo.position" content="15.4;73.9" />
    <meta name="ICBM" content="15.4, 73.9" />

    <!--
      ══════════════════════════════════════════════
      PERFORMANCE: Self-hosted font preloads
      Eliminates 2 Google Fonts round-trips (DNS + TLS + download)
      that previously blocked FCP for ~1,158 ms on mobile Slow 4G.
      ══════════════════════════════════════════════
    -->
    <link rel="preload" href="/fonts/plus-jakarta-sans.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/lora.woff2" as="font" type="font/woff2" crossorigin />

    <!--
      ══════════════════════════════════════════════
      PERFORMANCE: LCP hero image preload — AVIF preferred, WebP fallback
      Without this, the browser can't discover the hero image until JS runs
      (~2,508 ms after navigation on mobile). The preload cuts discovery to ~0 ms.
      Mobile gets a 800px image; desktop gets the full 1920px version.
      fetchpriority="high" tells the browser this is the most important resource.
      ══════════════════════════════════════════════
    -->
    <link
      rel="preload"
      as="image"
      href="/assets-static/schoolars-group.avif"
      imagesrcset="
        /assets-static/schoolars-group-800.avif 800w,
        /assets-static/schoolars-group.avif 1920w
      "
      imagesizes="(max-width: 768px) 100vw, 1920px"
      fetchpriority="high"
      type="image/avif"
    />

    <!--
      DNS prefetch for third-party origins — resolves DNS in background
      so ElevenLabs widget (when eventually loaded) connects faster.
    -->
    <link rel="dns-prefetch" href="https://unpkg.com" />
    <link rel="dns-prefetch" href="https://api.us.elevenlabs.io" />
    <link rel="dns-prefetch" href="https://supabase.co" />

    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicon — 48px for browser tab (tiny footprint vs 261 KB original) -->
    <link rel="icon" type="image/png" href="/favicon-48.png" sizes="48x48" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Schoolars Hub — Quality Tuition Coaching in Goa" />
    <meta property="og:description" content="Expert tuition for Classes 1–12 in Science, Maths, English &amp; more. Two Goa campuses, transparent fees, 5.0★ Google rating." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Schoolars Hub" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Schoolars Hub — Quality Tuition Coaching in Goa" />
    <meta name="twitter:description" content="Expert tuition for Classes 1–12 across 7 subjects. Transparent fees, real reviews. Thivim &amp; Corlim campuses." />
  </head>
